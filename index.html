    <!-- Fonts:
         - Star Jedi → STAR WARS logo/name (via local @font-face in variables.css)
         - Pathway Gothic One → crawl text, section titles (tall narrow like SW crawl)
         - Franklin Gothic / Barlow → body text (close to original SW subtitle font)
         - Fira Code → code/tech badges
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Pathway+Gothic+One&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- FOWT Prevention -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('sv-portfolio-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
